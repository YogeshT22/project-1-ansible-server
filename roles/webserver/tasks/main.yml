---
# webserver/tasks/main.yml

# -- Package management -------------------------------------------
- name: 1. Update APT package cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  tags: [packages]

- name: 2. Install required packages
  ansible.builtin.apt:
    name: "{{ webserver_packages }}"
    state: present
  tags: [packages]

# -- Nginx --------------------------------------------------------
- name: 3. Deploy Nginx configuration
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: "0644"
    validate: "/usr/sbin/nginx -t -c %s"
  notify: Reload Nginx
  tags: [nginx]

- name: 4. Deploy index.html
  ansible.builtin.template:
    src: index.html.j2
    dest: /var/www/html/index.html
    owner: www-data
    group: www-data
    mode: "0644"
  tags: [nginx]

- name: 5. Ensure Nginx is started and enabled
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true
  tags: [nginx]

# -- Firewall (UFW) -----------------------------------------------
- name: 6. Allow required ports through UFW
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ webserver_ufw_allowed_ports }}"
  tags: [security, firewall]

- name: 7. Enable UFW with deny-by-default policy
  community.general.ufw:
    state: enabled
    policy: deny
  when: ansible_virtualization_type != "docker"
  tags: [security, firewall]

# -- fail2ban -----------------------------------------------------
- name: 8. Ensure fail2ban is started and enabled
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true
  when: ansible_virtualization_type != "docker"
  tags: [security, fail2ban]

# -- Automated security updates -----------------------------------
- name: 9. Schedule daily unattended security upgrades
  ansible.builtin.cron:
    name: "Daily unattended security upgrades"
    weekday: "*"
    hour: "{{ webserver_security_update_hour }}"
    minute: "{{ webserver_security_update_minute }}"
    job: >-
      DEBIAN_FRONTEND=noninteractive apt-get update &&
      DEBIAN_FRONTEND=noninteractive apt-get -y
      -o Dpkg::Options::=--force-confdef
      -o Dpkg::Options::=--force-confold
      dist-upgrade
  tags: [security, updates]
