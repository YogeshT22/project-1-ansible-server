---
# defaults/main.yml
# ─────────────────────────────────────────────────────────────
# These are LOW-PRIORITY defaults. Override them in:
#   - inventory host/group vars
#   - playbook vars
#   - the command line with -e
# ─────────────────────────────────────────────────────────────

# Site identity
server_name: "_" # Nginx server_name; set to your domain in production
server_admin_email: "admin@example.com" # Used in index.html and for alerting

# Nginx tuning
nginx_worker_connections: 1024 # Production standard (was 768)

# Firewall – ports that UFW will open
ufw_allowed_ports:
  - "22" # SSH
  - "80" # HTTP
  - "443" # HTTPS

# Security-update cron schedule (run at 02:00 every day)
security_update_hour: "2"
security_update_minute: "0"
