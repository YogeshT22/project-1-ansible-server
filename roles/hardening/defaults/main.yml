---
# hardening/defaults/main.yml
# ──────────────────────────────────────────────────────────────
# Override any of these in inventory group_vars or with -e.
# ──────────────────────────────────────────────────────────────

# Login banner text shown before SSH authentication
motd_banner: |
  ############################################################
  #  Authorised access only. All activity may be monitored.  #
  ############################################################

# sysctl hardening knobs (network + kernel)
# Each entry maps directly to a kernel parameter.
sysctl_hardening_params:
  # ── Network: spoofing / ICMP ────────────────────────────────
  net.ipv4.conf.all.rp_filter: 1 # reverse path filtering
  net.ipv4.conf.default.rp_filter: 1
  net.ipv4.icmp_echo_ignore_broadcasts: 1 # ignore broadcast pings (Smurf)
  net.ipv4.conf.all.accept_redirects: 0 # no ICMP redirects
  net.ipv4.conf.all.send_redirects: 0
  net.ipv4.conf.all.accept_source_route: 0 # no source-routed packets
  # ── Network: SYN flood protection ──────────────────────────
  net.ipv4.tcp_syncookies: 1
  net.ipv4.tcp_max_syn_backlog: 2048
  # ── Kernel: hardening ───────────────────────────────────────
  kernel.randomize_va_space: 2 # full ASLR
  fs.suid_dumpable: 0 # no core dumps from SUID binaries
