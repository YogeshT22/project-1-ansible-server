---
# hardening/tasks/main.yml
# ──────────────────────────────────────────────────────────────
# OS-level hardening, kept separate from the webserver role so
# it can be applied to ANY server type (db, cache, etc.).
# ──────────────────────────────────────────────────────────────

# ── Packages ─────────────────────────────────────────────────
- name: Install auditd for system call auditing
  ansible.builtin.apt:
    name:
      - auditd
      - audispd-plugins
    state: present
    update_cache: true
  tags: [hardening, auditd]

- name: Ensure auditd is started and enabled
  ansible.builtin.service:
    name: auditd
    state: started
    enabled: true
  tags: [hardening, auditd]

# ── Kernel hardening via sysctl ───────────────────────────────
- name: Apply sysctl security parameters
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: true
    sysctl_file: /etc/sysctl.d/99-hardening.conf
  loop: "{{ sysctl_hardening_params | dict2items }}"
  # Skip kernel params that don't exist in Docker (no full kernel)
  failed_when:
    - sysctl_result is failed
    - ansible_virtualization_type != "docker"
  register: sysctl_result
  tags: [hardening, sysctl]

# ── Login banner (MOTD) ───────────────────────────────────────
- name: Deploy login warning banner to /etc/motd
  ansible.builtin.template:
    src: motd.j2
    dest: /etc/motd
    owner: root
    group: root
    mode: "0644"
  tags: [hardening, banner]

- name: Deploy SSH pre-login banner to /etc/issue.net
  ansible.builtin.template:
    src: motd.j2
    dest: /etc/issue.net
    owner: root
    group: root
    mode: "0644"
  tags: [hardening, banner]

# ── Disable unused / risky services ──────────────────────────
- name: Disable unused services (avahi-daemon, cups)
  ansible.builtin.service:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop:
    - avahi-daemon
    - cups
  # Gracefully skip if service doesn't exist on this host
  failed_when: false
  tags: [hardening, services]

# ── File permission hardening ─────────────────────────────────
- name: Ensure /etc/crontab exists
  ansible.builtin.file:
    path: /etc/crontab
    state: touch
    owner: root
    group: root
    mode: "0600"
    modification_time: preserve
    access_time: preserve
  tags: [hardening, permissions]

- name: Restrict /etc/passwd permissions
  ansible.builtin.file:
    path: /etc/passwd
    owner: root
    group: root
    mode: "0644"
  tags: [hardening, permissions]

- name: Restrict /etc/shadow permissions
  ansible.builtin.file:
    path: /etc/shadow
    owner: root
    group: shadow
    mode: "0640"
  tags: [hardening, permissions]
