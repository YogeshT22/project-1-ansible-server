---
# Entry point
# Usage:
#   ansible-playbook playbook.yml
#   ansible-playbook playbook.yml --tags hardening
#   ansible-playbook playbook.yml --check --diff

- name: Provision and harden server
  hosts: webservers
  become: true

  roles:
    - role: hardening
      tags: [hardening]
    - role: webserver
      tags: [webserver]
