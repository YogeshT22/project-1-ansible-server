# ──────────────────────────────────────────────────────────────────────────────
# CI Pipeline – YAML Lint → Ansible Lint → Molecule Tests
#
# Runs automatically on every push and pull request to main.
# FREE on all public GitHub repositories (unlimited minutes).
#
# Pipeline order:
#   yamllint → ansible-lint → molecule
# Each job only runs if the previous one passes.
# ──────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Validate all YAML files are well-formed ──────────────────────────
  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: "."
          config_data: |
            extends: default
            rules:
              line-length:
                max: 120
              comments:
                min-spaces-from-content: 1
              truthy:
                allowed-values: ["true", "false", "yes", "no"]

  # ── Job 2: Ansible best-practice checks ─────────────────────────────────────
  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    needs: yamllint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install required Ansible collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Run ansible-lint
        uses: ansible/ansible-lint@v24
        with:
          args: playbook.yml

  # ── Job 3: Molecule integration tests ───────────────────────────────────────
  molecule:
    name: Molecule Test (webserver role)
    runs-on: ubuntu-latest
    needs: ansible-lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Molecule and dependencies
        run: |
          pip install --upgrade pip
          pip install molecule molecule-plugins[docker] ansible
          ansible-galaxy collection install -r requirements.yml

      - name: Run Molecule tests
        run: molecule test
        working-directory: roles/webserver
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
