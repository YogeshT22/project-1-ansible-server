[defaults]
inventory           = inventory.ini
remote_user         = ansible
private_key_file    = ~/.ssh/id_rsa
host_key_checking   = False
diff_always         = True
result_format       = yaml
callbacks_enabled   = profile_tasks
retry_files_enabled = False

[ssh_connection]
pipelining = True
ssh_args   = -o ControlMaster=auto -o ControlPersist=60s
