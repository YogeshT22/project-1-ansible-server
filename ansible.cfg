[defaults]
inventory          = inventory.ini
host_key_checking  = False
# Show a concise, readable diff when a task changes something on the server
diff_always        = True
# Show task timing so you can spot slow tasks
callbacks_enabled  = profile_tasks
# Retry files pollute the repo; keep them out
retry_files_enabled = False
# Human-readable YAML output (ansible-core 2.13+ syntax)
stdout_callback    = default
result_format      = yaml

[ssh_connection]
# Reuse SSH connections instead of opening a new one per task (much faster)
pipelining         = True
ssh_args           = -o ControlMaster=auto -o ControlPersist=60s
