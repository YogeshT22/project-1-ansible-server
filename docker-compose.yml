---
# Docker Compose file for Ansible target server
# Note: 'version' key is obsolete in Docker Compose v2+ and intentionally omitted.
services:
  personal-server:
    container_name: ansible-target-server
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "2222:22"
      - "8080:80"
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/22"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
