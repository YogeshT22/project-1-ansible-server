---\n# Docker Compose file for Ansible target server\n# This file sets up a personal server with Ansible\n\n# Note: 'version' key is obsolete in Docker Compose v2+ and is intentionally omitted.\nservices:\n  personal-server:\n    container_name: ansible-target-server\n    build:\n      context: .\n      dockerfile: Dockerfile.server\n    ports:\n      - "2222:22" # SSH – Ansible connects here\n      - "8080:80" # HTTP – browse the configured site\n    # Required so UFW can manage iptables rules inside the container.\n    cap_add:\n      - NET_ADMIN\n    # Restart policy mirrors production behaviour (systemd equivalent).\n    restart: unless-stopped\n    # Health check: verify sshd is accepting connections every 30 s.\n    healthcheck:\n      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/22"]\n      interval: 30s\n      timeout: 5s\n      retries: 3\n      start_period: 10s\n